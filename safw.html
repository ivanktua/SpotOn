<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotOn MVP - Пошук Роботи</title>
    <link rel="stylesheet" href="wqfwe.css">
</head>
<body>

    <nav class="header">
        <div class="container header-flex">
            <a href="#" class="logo-link">
                <img src="https://res.cloudinary.com/dwbi2xqms/image/upload/v1775894203/logo_xt2izz.png" alt="SpotOn" class="main-logo">
            </a>
            <span class="tagline">Вакансії в реальному часі</span>
            <a href="login.html" style="color: white; text-decoration: none; font-size: 12px; opacity: 0.6;">Адмін</a>
        </div>
    </nav>

    <main class="container">
        <section class="search-box">
            <input type="text" id="searchInput" placeholder="Кого ви шукаєте? (водій, бариста...)">
        </section>

        <div id="locationsList" class="locations-list">
            
            <div class="spot-card" data-name="бібліотека кпі архів робота">
                <div class="spot-info">
                    <h3>Бібліотека КПІ</h3>
                    <p>Бібліотека КПІ, Київ</p>
                    <div class="stats">
                        <span class="status-dot online"></span>
                        Змін доступно: <span id="seats-1">2</span>
                    </div>
                </div>
                <div class="action">
                    <button onclick="bookSeat(1, this)" class="btn-main">Відгукнутись</button>
                </div>
            </div>

        </div>
    </main>

    <script src="esdg.js"></script>
</body>
</html>
